<!doctype html>
<html lang="en">
  <head>
    <title>Spaced Repetition</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.mjs"></script>
  </head>
  <body>
    <main>
      <div class="content">
        <div>
          <label for="user-select">Users:</label>
          <select id="user-select" class="user-select"></select>
        </div>
        <section id="content-section" class="content-section"></section>
      </div>
      <div class="input-div hidden" id="input">
          <form id="agenda-form">
            <label for="topic">Add new topic:</label>
            <input name="topic" type="text" id="topic" class="topic" required />
            <label for="date">Date:</label>
            <input name="date" type="date" id="date" required />
            <button type="submit">Add</button>
            <button type="reset">Reset</button>
          </form>
          <button type="button" id="clear-button">Clear user agendas</button>
          <p class="error-msg"></p>
      </div>
    </main>
  </body>
</html>
